<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font: 12px/1.45 Inter, sans-serif;
        color: #202020;
        background: #f4f4f2;
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto auto;
        gap: 14px;
        height: 100vh;
        padding: 16px;
        overflow: hidden;
      }

      header {
        display: grid;
        gap: 6px;
        margin: -16px -16px 0;
        padding: 16px 16px 14px;
        border-bottom: 1px solid #deded9;
        background: #fbfbfa;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .muted {
        color: #686864;
        font-size: 11px;
      }

      textarea {
        width: 100%;
        height: 100%;
        min-height: 0;
        resize: vertical;
        overflow: auto;
        padding: 12px;
        border: 1px solid #c8c8c2;
        border-radius: 6px;
        outline: none;
        background: #fff;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.03);
        color: #222;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      textarea:focus {
        border-color: #6f6f66;
        box-shadow: 0 0 0 2px rgba(34, 34, 34, 0.08);
      }

      button {
        min-height: 38px;
        border: 1px solid #1f1f1c;
        border-radius: 6px;
        background: #1f1f1c;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.14);
      }

      button:hover:not(:disabled) {
        background: #30302c;
      }

      button:disabled {
        opacity: 0.5;
        cursor: wait;
        box-shadow: none;
      }

      .actions {
        display: grid;
        gap: 8px;
        min-height: 0;
      }

      button.secondary {
        border-color: #b9b9b2;
        background: #fff;
        color: #222;
        box-shadow: none;
      }

      button.secondary:hover:not(:disabled) {
        background: #f6f6f3;
      }

      .status {
        display: grid;
        gap: 8px;
        min-height: 92px;
        max-height: 150px;
        overflow: auto;
        padding: 10px;
        border: 1px solid #d2d2cc;
        border-radius: 6px;
        background: #fbfbfa;
      }

      .status-title {
        font-weight: 700;
      }

      .status pre {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: #3f3f3a;
        font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Workshop</h1>
        <div class="muted" id="meta">Loading registry...</div>
      </header>

      <textarea id="recipe" spellcheck="false"></textarea>
      <div class="actions">
        <button id="assemble" type="button">Assemble Page</button>
        <button class="secondary" id="externalWire" type="button">Codex Link</button>
      </div>
      <section class="status" aria-live="polite">
        <div class="status-title" id="statusTitle">Ready</div>
        <pre id="statusDetails">No assembly run yet.</pre>
      </section>
    </main>

    <script>
      const recipe = document.getElementById("recipe");
      const assemble = document.getElementById("assemble");
      const externalWire = document.getElementById("externalWire");
      const meta = document.getElementById("meta");
      const statusTitle = document.getElementById("statusTitle");
      const statusDetails = document.getElementById("statusDetails");

      parent.postMessage({ pluginMessage: { type: "ready" } }, "*");

      assemble.addEventListener("click", () => {
        assemble.textContent = "Assembling...";
        assemble.disabled = true;
        setStatus("Assembling", "Running pasted JSON...");
        parent.postMessage({ pluginMessage: { type: "assemble-json", recipeJson: recipe.value } }, "*");
      });

      externalWire.addEventListener("click", () => {
        externalWire.textContent = "Assembling...";
        externalWire.disabled = true;
        setStatus("Assembling", "Running embedded Codex Link payload...");
        parent.postMessage({ pluginMessage: { type: "external-wire" } }, "*");
      });

      onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "ready") {
          recipe.value = JSON.stringify(message.recipe, null, 2);
          meta.textContent = `${message.referenceCount} refs, ${message.registryCount} registry keys embedded · ${message.buildLabel || "unlabeled build"}`;
          setStatus("Ready", `Loaded ${message.buildLabel || "unlabeled build"}.`);
          return;
        }

        if (message.type === "assemble-complete") {
          assemble.disabled = false;
          assemble.textContent = `Created ${message.result.sectionCount} Sections`;
          window.setTimeout(() => (assemble.textContent = "Assemble Page"), 1200);
          showResult("Assembly Complete", message.result);
          return;
        }

        if (message.type === "assemble-error") {
          assemble.disabled = false;
          assemble.textContent = "Assembly Failed";
          window.setTimeout(() => (assemble.textContent = "Assemble Page"), 1600);
          setStatus("Assembly Failed", message.message || "Assembly failed.");
          alert(message.message || "Assembly failed.");
          return;
        }

        if (message.type === "codex-link-complete") {
          externalWire.disabled = false;
          externalWire.textContent = `Created ${message.result.sectionCount} Sections`;
          window.setTimeout(() => (externalWire.textContent = "Codex Link"), 1200);
          showResult("Codex Link Complete", message.result);
          return;
        }

        if (message.type === "codex-link-error") {
          externalWire.disabled = false;
          externalWire.textContent = "Codex Link Failed";
          window.setTimeout(() => (externalWire.textContent = "Codex Link"), 1600);
          setStatus("Codex Link Failed", message.message || "Codex Link failed.");
          alert(message.message || "Codex Link failed.");
        }
      };

      function showResult(title, result) {
        const diagnostics = Array.isArray(result.copyDiagnostics) ? result.copyDiagnostics : [];
        setStatus(
          title,
          [
            `sections: ${result.sectionCount}`,
            `copy overrides: ${result.copyOverrideCount}`,
            `copy diagnostics: ${diagnostics.length ? diagnostics.join("\n") : "none"}`,
          ].join("\n"),
        );
      }

      function setStatus(title, details) {
        statusTitle.textContent = title;
        statusDetails.textContent = details;
      }
    </script>
  </body>
</html>
